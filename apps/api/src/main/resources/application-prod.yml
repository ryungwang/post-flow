# prod 프로필 — 시크릿은 디폴트 금지(${ENV}), 공유 db의 앱 전용 DB(postflow)+스키마(postflow).
# 리버스프록시/HTTPS는 Caddy(서버 관리). 앱은 내부 8080만 노출.

# 에러 모니터링 — prod 환경 태깅(SENTRY_DSN 미설정 시 no-op)
sentry:
  environment: prod

server:
  # Caddy 뒤 — X-Forwarded-*(호스트/프로토콜)를 존중해 절대 URL을 공개 도메인으로 생성.
  forward-headers-strategy: framework
spring:
  # 공유 postgres(호스트 db)만 공용. 데이터베이스는 post-flow 전용(synub_postflow), 스키마는 postflow.
  datasource:
    # URL은 시크릿 아님 → yml 기본값(공용 db의 synub_postflow), 유저/비번만 env.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/synub_postflow}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-init-sql: ${SPRING_DATASOURCE_INIT_SQL:SET search_path TO postflow}

storage:
  # 운영은 S3(업로드 이미지/영상). 자격증명=AWS_* env(DefaultCredentialsProvider, s3.env).
  # bucket/region은 공유 s3.env, prefix는 AWS_S3_PREFIX로 앱별 격리(기본 synub-postflow).
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
    prefix: ${AWS_S3_PREFIX:synub-postflow}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
