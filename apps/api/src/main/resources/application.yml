spring:
  application:
    name: postflow-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: postflow
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: postflow
    create-schemas: true
    default-schema: postflow
  servlet:
    multipart:
      max-file-size: 16MB
      max-request-size: 16MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

ai:
  provider: ${AI_PROVIDER:claude}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    models:
      LIGHT: claude-haiku-4-5
      STANDARD: claude-sonnet-4-6
      PREMIUM: claude-opus-4-8

auth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  jwt:
    # Dev default is non-secret; prod MUST inject AUTH_JWT_SECRET (>= 32 bytes).
    secret: ${AUTH_JWT_SECRET:dev-only-insecure-secret-change-me-32bytes!!}
    expiration: ${AUTH_JWT_EXPIRATION:7d}
