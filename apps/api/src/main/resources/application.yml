spring:
  application:
    name: postflow-api
  # Local dev: drop keys into apps/api/.env (gitignored). Auto-imported as properties.
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: postflow
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: postflow
    create-schemas: true
    default-schema: postflow
  servlet:
    multipart:
      max-file-size: 110MB
      max-request-size: 110MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

ai:
  provider: ${AI_PROVIDER:claude}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    models:
      LIGHT: claude-haiku-4-5
      STANDARD: claude-sonnet-4-6
      PREMIUM: claude-opus-4-8

# synub 통합 시스템 연동(office 컨벤션과 동일). 로그인=SSO 토큰 검증, 구독=중앙 빌링.
synub:
  sso:
    # RS256 토큰은 base-url의 JWKS(base-url + /.well-known/jwks.json)로 검증.
    base-url: ${SYNUB_SSO_BASE_URL:http://localhost:8090}
    issuer: ${SYNUB_SSO_ISSUER:https://accounts.synub.io}
    audience: ${SYNUB_SSO_AUDIENCE:synub-postflow}
  billing:
    # 결제는 post-flow가 하지 않고, 웹훅 수신·entitlements 조회만.
    base-url: ${SYNUB_BILLING_BASE_URL:http://localhost:8088}
    service-code: ${SYNUB_BILLING_SERVICE_CODE:post-flow}
    # 빌링의 SERVICE_API_KEY와 동일. 웹훅 시크릿은 빌링 app.webhook.secret과 동일.
    service-key: ${SYNUB_BILLING_SERVICE_KEY:local-service-key}
    webhook-secret: ${SYNUB_BILLING_WEBHOOK_SECRET:local-dev-webhook-secret}
    portal-url: ${SYNUB_BILLING_PORTAL_URL:https://app.synub.io}

auth:
  # Threads OAuth state 서명용(내부 전용). 로그인용 아님.
  state-secret: ${AUTH_STATE_SECRET:dev-only-insecure-state-secret-change-me-32b!}
  # 비공개 베타 접근 허용목록(external_id, 쉼표구분). 오픈 전이라 이 계정들만 로그인 가능.
  # 데모 계정(demo-user)은 이와 별개로 항상 허용(읽기전용 체험). 공개 시 빈 값으로 두면 전체 허용.
  # haru=usr_admin_haru, sky=usr_office_sky, admin=usr_office_admin
  allowed-external-ids: ${AUTH_ALLOWED_EXTERNAL_IDS:usr_admin_haru,usr_office_sky,usr_office_admin}

threads:
  app-id: ${THREADS_APP_ID:}
  app-secret: ${THREADS_APP_SECRET:}
  redirect-uri: ${THREADS_REDIRECT_URI:http://localhost:8080/threads/callback}
  # threads_read_replies = 답글 '읽기'(댓글 뷰어·자동화 키워드 감지), threads_manage_replies = 답글 '관리'(숨김·답장).
  # 둘은 별개 권한 — 읽기만 하려 해도 read_replies 없으면 code10(permission denied). basic 제외 검수 대상.
  scopes: threads_basic,threads_content_publish,threads_manage_insights,threads_read_replies,threads_manage_replies
  authorize-base-url: https://threads.net
  graph-base-url: https://graph.threads.net
  frontend-redirect-url: ${THREADS_FRONTEND_REDIRECT_URL:http://localhost:5173/settings/threads?threads=connected}
  publisher:
    interval-ms: 60000
  token-refresh:
    cron: "0 0 3 * * *"
