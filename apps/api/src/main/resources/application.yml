spring:
  application:
    name: postflow-api
  # Local dev: drop keys into apps/api/.env (gitignored). Auto-imported as properties.
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: postflow
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: postflow
    create-schemas: true
    default-schema: postflow
  servlet:
    multipart:
      max-file-size: 110MB
      max-request-size: 110MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

ai:
  provider: ${AI_PROVIDER:claude}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    models:
      LIGHT: claude-haiku-4-5
      STANDARD: claude-sonnet-4-6
      PREMIUM: claude-opus-4-8

# 로그인은 synub-sso(통합계정)로 중앙화. post-flow는 SSO RS256 토큰을 JWKS로 검증.
sso:
  base-url: ${SSO_BASE_URL:http://localhost:8090}
  issuer: ${SSO_ISSUER:https://accounts.synub.io}
  audience: ${SSO_AUDIENCE:synub-postflow}
  jwks-uri: ${SSO_JWKS_URI:http://localhost:8090/.well-known/jwks.json}

auth:
  # Threads OAuth state 서명용(내부 전용). 로그인용 아님.
  state-secret: ${AUTH_STATE_SECRET:dev-only-insecure-state-secret-change-me-32b!}

threads:
  app-id: ${THREADS_APP_ID:}
  app-secret: ${THREADS_APP_SECRET:}
  redirect-uri: ${THREADS_REDIRECT_URI:http://localhost:8080/api/threads/callback}
  scopes: threads_basic,threads_content_publish,threads_manage_insights
  authorize-base-url: https://threads.net
  graph-base-url: https://graph.threads.net
  frontend-redirect-url: ${THREADS_FRONTEND_REDIRECT_URL:http://localhost:5173/settings?threads=connected}
  publisher:
    interval-ms: 60000
  token-refresh:
    cron: "0 0 3 * * *"
